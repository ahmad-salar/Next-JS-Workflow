name: Job Concurrency

on:
  push:
    branches: [ main ]
    
jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: Deploy
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0
      - name: Install Dependencies
        run: npm install
      - name: Build Next.JS App
        run: npm run build
      - name: Deploy
        run: echo "Deploy App...."
